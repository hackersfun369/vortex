<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vortex — Live Tunnels</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/vortex/css/style.css">
</head>
<body>
<nav class="nav">
  <a href="/vortex/" class="nav-logo">⬡ vortex</a>
  <div class="nav-links">
    <a href="/vortex/portal.html">portal</a>
    <a href="/vortex/docs.html">docs</a>
    <a href="/vortex/live.html" class="active">live</a>
    <img id="nav-avatar" src="" alt="" class="hidden" style="width:28px;height:28px;border-radius:50%;border:1px solid var(--border2)">
    <span id="nav-user" class="nav-user hidden"></span>
    <a href="/vortex/dashboard.html" id="nav-dashboard" class="btn-nav hidden">dashboard</a>
    <a id="nav-signin" href="#" onclick="goSignIn()" class="btn-nav">sign in</a>
    <button id="nav-signout" onclick="signOut()" class="btn-nav-ghost hidden">sign out</button>
  </div>
</nav>

<main class="live-main">
  <div id="pw-gate" class="center-card" style="max-width:420px;margin:6rem auto;text-align:center">
    <h2 style="margin-bottom:0.5rem">Live tunnel board</h2>
    <p class="muted" style="margin-bottom:1.5rem">Enter the board password to view all active public tunnels.</p>
    <div class="form-group" style="text-align:left">
      <input type="password" id="pw-input" placeholder="password"
        onkeydown="if(event.key==='Enter')unlock()"
        style="width:100%;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;padding:0.7rem 1rem;color:var(--text);font-family:var(--sans);outline:none">
    </div>
    <div id="pw-error" class="error-box hidden" style="margin-bottom:0.8rem">Incorrect password</div>
    <button onclick="unlock()" class="btn-primary full-width">View board</button>
  </div>

  <div id="board" class="hidden">
    <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem;flex-wrap:wrap">
      <h1 style="font-size:1.5rem;margin:0">
        Live tunnels
        <span id="t-count" style="background:var(--accent);color:#fff;padding:0.15rem 0.6rem;border-radius:12px;font-size:0.8rem;margin-left:0.5rem">0</span>
      </h1>
      <span id="updated-at" class="muted" style="font-size:0.85rem"></span>
      <button onclick="loadBoard()" class="copy-btn-sm" style="margin-left:auto">↻ refresh</button>
    </div>

    <div id="board-loading" class="muted">Loading tunnels...</div>
    <div id="board-empty" class="hidden muted">No active public tunnels right now.</div>

    <table id="board-table" class="tunnels-table hidden">
      <thead>
        <tr>
          <th>Subdomain</th>
          <th>URL</th>
          <th>Status</th>
          <th>Reserved</th>
          <th>Last seen</th>
          <th>Created</th>
        </tr>
      </thead>
      <tbody id="board-body"></tbody>
    </table>
  </div>
</main>

<script src="/vortex/js/app.js"></script>
<script>
const PW_KEY = 'vortex_board_pw'

function goSignIn() { window.location.href = getSignInUrl() }

window.addEventListener('load', () => {
  initNav()
  const saved = sessionStorage.getItem(PW_KEY)
  if (saved) loadBoard(saved)
})

async function unlock() {
  const pw = document.getElementById('pw-input').value
  if (!pw) return
  document.getElementById('pw-error').classList.add('hidden')

  const res = await fetch(`${API}/tunnels`, {
    headers: { 'X-Board-Password': pw }
  })

  if (res.status === 401) {
    document.getElementById('pw-error').classList.remove('hidden')
    sessionStorage.removeItem(PW_KEY)
    return
  }

  sessionStorage.setItem(PW_KEY, pw)
  document.getElementById('pw-gate').classList.add('hidden')
  document.getElementById('board').classList.remove('hidden')
  const data = await res.json()
  renderBoard(data)
}

async function loadBoard(pw) {
  const p = pw || sessionStorage.getItem(PW_KEY)
  if (!p) return
  const res  = await fetch(`${API}/tunnels`, { headers: { 'X-Board-Password': p } })
  if (!res.ok) { sessionStorage.removeItem(PW_KEY); return }

  document.getElementById('pw-gate').classList.add('hidden')
  document.getElementById('board').classList.remove('hidden')
  const data = await res.json()
  renderBoard(data)
}

function renderBoard(data) {
  document.getElementById('board-loading').classList.add('hidden')
  document.getElementById('t-count').textContent    = data.count || 0
  document.getElementById('updated-at').textContent = data.updated_at ? `updated ${new Date(data.updated_at).toLocaleTimeString()}` : ''

  const tbody = document.getElementById('board-body')
  const table = document.getElementById('board-table')
  const empty = document.getElementById('board-empty')

  if (!data.tunnels?.length) {
    empty.classList.remove('hidden'); table.classList.add('hidden'); return
  }

  table.classList.remove('hidden'); empty.classList.add('hidden')
  tbody.innerHTML = ''

  const statusMap = {
    active:   ['● active',   'status-green'],
    inactive: ['○ inactive', 'status-yellow'],
    grace:    ['⟳ grace',    'status-yellow'],
    expired:  ['✕ expired',  'status-red'],
  }

  data.tunnels.forEach(t => {
    const [label, cls] = statusMap[t.status] || ['unknown','status-gray']
    const tr = document.createElement('tr')
    tr.innerHTML = `
      <td><code>${t.subdomain}</code></td>
      <td><a href="${t.url}" target="_blank" style="color:var(--accent2);font-size:0.85rem">${t.url}</a></td>
      <td><span class="status-badge ${cls}">${label}</span></td>
      <td>${t.reserved ? 'Yes' : 'No'}</td>
      <td>${timeAgo(t.last_seen)}</td>
      <td>${new Date(t.created_at).toLocaleDateString()}</td>
    `
    tbody.appendChild(tr)
  })
}

function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime()
  const m    = Math.floor(diff / 60000)
  if (m < 1)  return 'just now'
  if (m < 60) return `${m}m ago`
  const h = Math.floor(m / 60)
  if (h < 24) return `${h}h ago`
  return `${Math.floor(h/24)}d ago`
}
</script>
</body>
</html>
