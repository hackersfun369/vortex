name = "vortex-api"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Daily cron to sweep expired tunnels
[triggers]
crons = ["0 2 * * *"]

# Deployed to workers.dev subdomain — no custom routes needed
# Live at: https://vortex-api.guessmesir-007.workers.dev

[vars]
ENVIRONMENT      = "production"
INACTIVITY_DAYS  = "365"
GRACE_DAYS       = "365"
BASE_DOMAIN      = "vortex-api.guessmesir-007.workers.dev"
PAGES_DOMAIN     = "hackersfun369.github.io/vortex"

# Set secrets via terminal — never put values here:
# npx wrangler secret put GITHUB_TOKEN
# npx wrangler secret put GITHUB_OAUTH_CLIENT_ID
# npx wrangler secret put GITHUB_OAUTH_CLIENT_SECRET
# npx wrangler secret put SESSION_SECRET
# npx wrangler secret put OWNER_TOKEN
# npx wrangler secret put LIVE_BOARD_PASSWORD
